# Deploy Sober Inventory to VPS on push to main or manual trigger
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH and deploy with rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -e
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_DEPLOY_PATH" ]; then
            echo "Missing required secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_DEPLOY_PATH"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'storage/logs/' \
            --exclude 'storage/barcode_bridge/*.json' \
            --exclude 'skills/' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p $VPS_DEPLOY_PATH/storage/barcode_bridge && chmod -R 775 $VPS_DEPLOY_PATH/storage 2>/dev/null || true"
          echo "Deploy completed successfully."
