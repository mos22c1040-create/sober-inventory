[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.openssl"]

[phases.install]
cmds = ["mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx", "echo Skipping composer install"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public public/index.php"
